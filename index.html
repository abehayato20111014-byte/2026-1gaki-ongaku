<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音楽総合学習クイズアプリ</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-hover: #1b5e20;
            --bg: #eceff1;
            --text: #263238;
            --card-bg: #ffffff;
            --warning: #ef6c00;
            --warning-hover: #e65100;
            --correct-bg: #d4edda;
            --wrong-bg: #f8d7da;
        }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .screen { display: none; }
        .screen.active { display: block; }
        h1, h2, h3 { text-align: center; }
        
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 10px 5px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        button:disabled { background-color: #cfd8dc; cursor: not-allowed; transform: none; }

        .btn-force-correct { background-color: var(--warning); }
        .btn-force-correct:hover { background-color: var(--warning-hover); }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #cfd8dc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 18px;
        }
        textarea { height: 120px; resize: vertical; line-height: 1.5; }
        img.quiz-img { max-width: 100%; height: auto; border: 2px solid #cfd8dc; border-radius: 8px; margin-bottom: 15px; }

        /* 2オクターブピアノのスタイル */
        .piano-container {
            display: flex;
            justify-content: center;
            margin: 25px 0;
            user-select: none;
            overflow-x: auto;
            padding: 10px 0;
            background: #263238;
            border-radius: 8px;
        }
        .piano {
            display: flex;
            position: relative;
            padding: 10px;
        }
        .key {
            cursor: pointer;
            position: relative;
            transition: 0.1s;
        }
        .white-key {
            width: 50px;
            height: 180px;
            background: white;
            border: 1px solid #333;
            border-radius: 0 0 5px 5px;
            z-index: 1;
        }
        .black-key {
            width: 32px;
            height: 110px;
            background: #000;
            border-radius: 0 0 4px 4px;
            margin-left: -16px;
            margin-right: -16px;
            z-index: 2;
        }
        .key.selected { background-color: #ffeb3b !important; }
        .key-label {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #999;
            pointer-events: none;
        }

        .progress { margin-bottom: 20px; font-weight: bold; color: #546e7a; text-align: center; }
        .feedback {
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            line-height: 1.6;
        }
        .feedback.correct { background-color: var(--correct-bg); color: #1b5e20; border: 1px solid #c3e6cb; }
        .feedback.wrong { background-color: var(--wrong-bg); color: #b71c1c; border: 1px solid #f5c6cb; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #cfd8dc; padding: 12px; text-align: center; }
        th { background-color: #f5f5f5; }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen" class="screen active">
        <h1>🎹 音楽総合学習クイズ</h1>
        <div style="text-align: center; margin-top: 30px;">
            <button onclick="startQuiz('all')">クイズを始める（ランダム順）</button>
            <button id="btn-retry" onclick="startQuiz('retry')" style="display: none;">間違えた問題に挑戦</button>
        </div>

        <h3 style="margin-top: 50px;">📈 成績の推移</h3>
        <div id="history-container">
            <table id="history-table">
                <thead>
                    <tr><th>日時</th><th>スコア</th><th>正答率</th></tr>
                </thead>
                <tbody id="history-tbody"></tbody>
            </table>
            <p id="no-history-msg" style="text-align: center; color: #999;">まだデータがありません。</p>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress" id="progress-text">問題 1 / 10</div>
        <h2 id="question-text">問題文</h2>
        
        <div id="image-container" style="display: none; text-align: center;">
            <img src="リコーダー.png" alt="リコーダーの画像" class="quiz-img" id="quiz-img-element">
        </div>

        <div id="input-container"></div>

        <div class="feedback" id="feedback-box"></div>

        <div class="control-panel">
            <button id="btn-force-correct" class="btn-force-correct" onclick="forceCorrect()">ほぼ正解なので判定を覆す</button>
            <div>
                <button id="btn-answer" onclick="submitAnswer()">回答を送信</button>
                <button id="btn-next" onclick="nextQuestion()" style="display: none;">次へ進む</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h1>お疲れ様でした！ 🎉</h1>
        <h2 id="result-score"></h2>
        <p id="result-message" style="text-align: center; font-size: 18px; margin: 20px 0;"></p>
        
        <div style="text-align: center; margin-top: 30px;">
            <button onclick="goHome()">ホームに戻る</button>
            <button id="btn-result-retry" onclick="startQuiz('retry')" style="display: none; background-color: var(--warning);">間違えた問題のみ再挑戦</button>
        </div>
    </div>
</div>

<script>
    /**
     * 問題データ
     * 問題1の「a」の選択肢に「クラインソプラニーノ」「クラインソプラニーノリコーダー」のパターンを追加しました。
     */
    const allQuestions = [
        {
            id: 1, type: "text",
            q: "リコーダーの種類を大きい（低い）順に、コントラバスから一番小さいものまで8種類を順番に書きなさい。（「、」またはカンマ区切り）",
            a: [
                "コントラバス、グレートバス、バス、テノール、アルト、ソプラノ、ソプラニーノ、ガークライン", 
                "コントラバス、グレートバス、バス、テノール、あると、ソプラノ、ソプラニーノ、ガークライン",
                "コントラバス、グレートバス、バス、テノール、アルト、ソプラノ、ソプラニーノ、クラインソプラニーノ",
                "コントラバス、グレートバス、バス、テノール、アルト、ソプラノ、ソプラニーノ、クラインソプラニーノリコーダー"
            ]
        },
        {
            id: 2, type: "text",
            q: "画像で指定されている「リコーダーの各部名称」を答えなさい。",
            img: true,
            a: ["ウインドウェイ", "歌口", "窓", "トーンホール", "足部管", "頭部管", "中部管", "サムホール", "ベル"]
        },
        { id: 3, type: "piano", q: "和音「C（基本形）」を構成する音をすべて選びなさい。", a: ["C", "E", "G"] },
        { id: 4, type: "piano", q: "和音「G（基本形）」を構成する音をすべて選びなさい。", a: ["G", "B", "D"] },
        { id: 5, type: "piano", q: "和音「Fm（基本形）」を構成する音をすべて選びなさい。", a: ["F", "G#", "C"] },
        { id: 6, type: "piano", q: "和音「C7」を構成する音をすべて選びなさい。", a: ["C", "E", "G", "A#"] },
        { id: 7, type: "piano", q: "和音「Dm7」を構成する音をすべて選びなさい。", a: ["D", "F", "A", "C"] },
        { id: 8, type: "piano", q: "和音「Gm6」を構成する音をすべて選びなさい。", a: ["G", "A#", "D", "E"] },
        
        { id: 9, type: "text", q: "歌曲「花」の作曲者は誰？", a: ["滝廉太郎", "瀧廉太郎"] },
        { id: 10, type: "text", q: "歌曲「花」の作詞者は誰？", a: ["武島羽衣"] },
        { id: 11, type: "text", q: "「花」のテンポは？", a: ["60～66", "60-66", "60〜66"] },
        { id: 12, type: "text", q: "「花」の序盤部分になぜ16分休符があるか？", a: ["躍動感を出すため", "躍動感をだすため"] },
        { id: 13, type: "text", q: "「花」は何分の何拍子？", a: ["4分の2", "2/4"] },
        { id: 14, type: "text", q: "「花」は何調？", a: ["ト長調"] },
        { id: 15, type: "text", q: "rit. とはどういう意味？", a: ["だんだん遅く"] },
        { id: 16, type: "text", q: "a tempo とはどういう意味？", a: ["もとの速さで", "元の速さで"] },
        { id: 17, type: "text", q: "「花」は、組歌「◯◯」の第1曲？", a: ["四季"] },
        { id: 18, type: "text", q: "歌詞中の「うらら」とは？", a: ["やわらかい日差しを受けている", "やわらかい日差し"] },
        { id: 19, type: "text", q: "歌詞中の「見ずや」とは？", a: ["みてごらん", "見てごらん"] },
        { id: 20, type: "text", q: "歌詞中の「げに」の意味は？", a: ["本当に", "ほんとうに"] },
        { id: 21, type: "textarea", q: "「花」の1番の歌詞を書きなさい。", a: ["春のうららの隅田川のぼりくだりの船人が櫂のしずくも花と散るながめを何にたとうべき"] },
        { id: 22, type: "textarea", q: "「花」の3番の歌詞を書きなさい。", a: ["錦おりなす長堤に暮るればのぼるおぼろ月げに一刻も千金のながめを何にたとうべき"] },
        { id: 23, type: "text", q: "「エーデルワイス」の Edel の意味は？", a: ["高貴な", "高貴"] },
        { id: 24, type: "text", q: "和音を記号で表したものを何というか？", a: ["コードネーム", "コード"] },
        { id: 25, type: "text", q: "複数の音が重なってできるものを？", a: ["和音"] },
        { id: 26, type: "text", q: "エーデルワイスの作曲者は？", a: ["R.ロジャーズ", "Rロジャーズ", "ロジャーズ"] },
        { id: 27, type: "text", q: "エーデルワイスの編曲者は？", a: ["飯沼審議", "飯沼信義"] },
        { id: 28, type: "text", q: "エーデルワイスのテンポは？", a: ["112～120", "112-120"] }
    ];

    // ピアノレイアウト
    const pianoLayout = [
        { n: 'C', t: 'white' }, { n: 'C#', t: 'black' }, { n: 'D', t: 'white' }, { n: 'D#', t: 'black' }, { n: 'E', t: 'white' },
        { n: 'F', t: 'white' }, { n: 'F#', t: 'black' }, { n: 'G', t: 'white' }, { n: 'G#', t: 'black' }, { n: 'A', t: 'white' }, { n: 'A#', t: 'black' }, { n: 'B', t: 'white' },
        { n: 'C', t: 'white', label: '中央ド' }, { n: 'C#', t: 'black' }, { n: 'D', t: 'white' }, { n: 'D#', t: 'black' }, { n: 'E', t: 'white' },
        { n: 'F', t: 'white' }, { n: 'F#', t: 'black' }, { n: 'G', t: 'white' }, { n: 'G#', t: 'black' }, { n: 'A', t: 'white' }, { n: 'A#', t: 'black' }, { n: 'B', t: 'white' },
        { n: 'C', t: 'white' }
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let wrongIds = [];
    let selectedKeys = new Set();
    let answered = false;

    window.onload = () => {
        loadHistory();
        checkRetry();
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goHome() {
        showScreen('home-screen');
        loadHistory();
        checkRetry();
    }

    function checkRetry() {
        const wrongs = JSON.parse(localStorage.getItem('musicWrongs')) || [];
        const btn = document.getElementById('btn-retry');
        if (wrongs.length > 0) {
            btn.style.display = 'inline-block';
            btn.innerText = `間違えた問題に挑戦 (${wrongs.length}問)`;
        } else {
            btn.style.display = 'none';
        }
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startQuiz(mode) {
        if (mode === 'all') {
            currentQuestions = shuffle([...allQuestions]);
        } else {
            const wrongs = JSON.parse(localStorage.getItem('musicWrongs')) || [];
            currentQuestions = shuffle(allQuestions.filter(q => wrongs.includes(q.id)));
        }
        currentIndex = 0; score = 0; wrongIds = [];
        showScreen('quiz-screen');
        render();
    }

    function render() {
        answered = false;
        const q = currentQuestions[currentIndex];
        document.getElementById('progress-text').innerText = `問題 ${currentIndex + 1} / ${currentQuestions.length}`;
        document.getElementById('question-text').innerText = q.q;
        
        document.getElementById('image-container').style.display = q.img ? 'block' : 'none';
        const imgEl = document.getElementById('quiz-img-element');
        imgEl.onerror = () => { imgEl.alt = "リコーダー.png をフォルダに入れてください"; };

        const container = document.getElementById('input-container');
        container.innerHTML = '';
        selectedKeys.clear();

        if (q.type === 'text' || q.type === 'textarea') {
            const el = document.createElement(q.type === 'text' ? 'input' : 'textarea');
            if (q.type === 'text') el.type = 'text';
            el.id = 'ans-input';
            el.placeholder = '回答を入力...';
            container.appendChild(el);
            el.focus();
        } else if (q.type === 'piano') {
            const pWrap = document.createElement('div');
            pWrap.className = 'piano-container';
            const pInner = document.createElement('div');
            pInner.className = 'piano';
            
            pianoLayout.forEach((k, idx) => {
                const kDiv = document.createElement('div');
                kDiv.className = `key ${k.t}-key`;
                kDiv.id = `key-${idx}`;
                kDiv.dataset.note = k.n;
                if (k.label) kDiv.innerHTML = `<span class="key-label">${k.label}</span>`;
                
                kDiv.onclick = function() {
                    if (answered) return;
                    this.classList.toggle('selected');
                    recalculateSelectedKeys(pInner);
                };
                pInner.appendChild(kDiv);
            });
            pWrap.appendChild(pInner);
            container.appendChild(pWrap);
        }

        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('btn-answer').style.display = 'inline-block';
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-force-correct').disabled = false;
        document.getElementById('btn-force-correct').style.opacity = '1';
    }

    function recalculateSelectedKeys(pianoElement) {
        selectedKeys.clear();
        pianoElement.querySelectorAll('.key.selected').forEach(el => {
            selectedKeys.add(el.dataset.note);
        });
    }

    function normalize(s) {
        return s.replace(/[Ａ-Ｚａ-ｚ０-９]/g, m => String.fromCharCode(m.charCodeAt(0) - 0xFEE0))
                .toLowerCase().replace(/[\s 、。,\.\n]/g, '');
    }

    function submitAnswer() {
        if (answered) return;
        answered = true;
        const q = currentQuestions[currentIndex];
        let correct = false;
        let userText = "";

        if (q.type === 'text' || q.type === 'textarea') {
            userText = document.getElementById('ans-input').value;
            const norm = normalize(userText);
            correct = q.a.some(ans => normalize(ans) === norm);
        } else {
            const selArr = Array.from(selectedKeys).sort();
            const ansArr = [...q.a].sort();
            correct = JSON.stringify(selArr) === JSON.stringify(ansArr);
            userText = selArr.join(', ') || "選択なし";
        }
        showFeedback(correct, userText);
    }

    function forceCorrect() {
        const q = currentQuestions[currentIndex];
        const alreadyWrongIdx = wrongIds.indexOf(q.id);
        if (alreadyWrongIdx !== -1) {
            wrongIds.splice(alreadyWrongIdx, 1);
            score++;
        } else if (!answered) {
            score++;
        }
        answered = true;
        showFeedback(true, "自己判定", true);
    }

    function showFeedback(isCorrect, userVal, isForced = false) {
        const q = currentQuestions[currentIndex];
        const box = document.getElementById('feedback-box');
        box.style.display = 'block';

        if (isCorrect) {
            if (!isForced) score++;
            box.className = 'feedback correct';
            box.innerHTML = isForced ? '⭐ 自己申告により正解としました。' : '⭕ 正解です！';
            document.getElementById('btn-force-correct').disabled = true;
            document.getElementById('btn-force-correct').style.opacity = '0.5';
        } else {
            if (!wrongIds.includes(q.id)) wrongIds.push(q.id);
            box.className = 'feedback wrong';
            const ansDisp = q.type === 'piano' ? q.a.join(', ') : q.a[0];
            box.innerHTML = `❌ 残念！<br>あなたの回答: ${userVal}<br>正解: ${ansDisp}`;
        }
        document.getElementById('btn-answer').style.display = 'none';
        document.getElementById('btn-next').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentQuestions.length) render();
        else finish();
    }

    function finish() {
        const prevWrongs = JSON.parse(localStorage.getItem('musicWrongs')) || [];
        const currentCorrectIds = currentQuestions.filter(q => !wrongIds.includes(q.id)).map(q => q.id);
        let updatedWrongs = prevWrongs.filter(id => !currentCorrectIds.includes(id));
        wrongIds.forEach(id => { if (!updatedWrongs.includes(id)) updatedWrongs.push(id); });
        localStorage.setItem('musicWrongs', JSON.stringify(updatedWrongs));

        const pct = Math.round((score / currentQuestions.length) * 100);
        const history = JSON.parse(localStorage.getItem('musicHistory')) || [];
        history.push({ date: new Date().toLocaleString(), score, total: currentQuestions.length, pct });
        localStorage.setItem('musicHistory', JSON.stringify(history));

        showScreen('result-screen');
        document.getElementById('result-score').innerText = `${currentQuestions.length}問中 ${score}問 正解 (${pct}%)`;
        document.getElementById('result-message').innerText = pct === 100 ? "完璧です！天才！" : "その調子で頑張りましょう！";
        document.getElementById('btn-result-retry').style.display = updatedWrongs.length > 0 ? 'inline-block' : 'none';
    }

    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('musicHistory')) || [];
        const tbody = document.getElementById('history-tbody');
        const msg = document.getElementById('no-history-msg');
        const tbl = document.getElementById('history-table');
        tbody.innerHTML = '';
        if (history.length === 0) {
            msg.style.display = 'block'; tbl.style.display = 'none';
        } else {
            msg.style.display = 'none'; tbl.style.display = 'table';
            [...history].reverse().slice(0, 5).forEach(h => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${h.date}</td><td>${h.score}/${h.total}</td><td>${h.pct}%</td>`;
                tbody.appendChild(tr);
            });
        }
    }
</script>

</body>
</html>
